<h1>VOXTERM</h1>
<p>Local real-time voice transcription with speaker diarization and P2P collaborative transcription. Runs entirely offline — no cloud APIs, no audio stored.</p>

<p>Install:</p>
<code>curl -fsSL https://voxterm.xyz/install.sh | bash</code>

<p>Then run:</p>
<code>voxterm</code>

<p class="dim">macOS (Apple Silicon) · Python 3.9+ · <a href="https://github.com/dmarzzz/VoxTerm">GitHub</a></p>
