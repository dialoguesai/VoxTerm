# Build + publish the on-device Android APK.
#
# Triggers
#   • push to `main` that touches a mobile path  -> build and update the rolling
#     `android-latest` prerelease (one always-current APK to sideload).
#   • manual `workflow_dispatch` (Actions tab)   -> same, with an optional model size.
#
# The APK is fully offline (mic-only, no INTERNET permission), arm64-v8a,
# Android 7+ (API 24). Install guide: docs/android-install.md.
#
# Signing: set the four ANDROID_* repo secrets (docs/android-install.md ->
# "Maintainers: signing") for stable, update-compatible releases. Without them
# the job still produces an installable APK signed with an ephemeral debug key
# (fine to try, but updates over a prior build may need an uninstall).

name: Android APK

on:
  push:
    branches: [main]
    paths:
      - "tauri-plugin-voxasr/**"
      - "src-tauri/**"
      - "gui/static/**"
      - "mobile-pair/**"
      - "scripts/stage-mobile.sh"
      - "scripts/android-dev.sh"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:
    inputs:
      model:
        description: "Bundled Whisper model"
        type: choice
        default: whisper-base.en
        options: [whisper-tiny.en, whisper-base.en, whisper-small.en]

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  VOXASR_MODEL: ${{ github.event.inputs.model || 'whisper-base.en' }}
  NDK_VERSION: "28.2.13676358"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust (+ arm64 Android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android-aarch64

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages + NDK
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;34.0.0" \
            "ndk;${NDK_VERSION}"
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Cache native deps (sherpa AAR + Whisper model)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/voxterm/sherpa
            tauri-plugin-voxasr/android/libs
          key: voxasr-deps-${{ env.VOXASR_MODEL }}-${{ hashFiles('tauri-plugin-voxasr/fetch-deps.sh') }}

      - name: Fetch native deps (sherpa AAR + Whisper model)
        run: ./tauri-plugin-voxasr/fetch-deps.sh

      - name: Set app version
        run: |
          set -euo pipefail
          # versionCode must strictly increase for every published build so Obtainium
          # / Android see an update; github.run_number is monotonic per workflow.
          VERSION="0.0.0-dev.${{ github.run_number }}"
          cat > src-tauri/gen/android/app/tauri.properties <<EOF
          tauri.android.versionCode=${{ github.run_number }}
          tauri.android.versionName=$VERSION
          EOF
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "versionCode=${{ github.run_number }} versionName=$VERSION"

      - name: Build APK (arm64)
        run: cargo tauri android build --apk --target aarch64

      - name: Sign APK
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BT="${ANDROID_SDK_ROOT}/build-tools/34.0.0"
          UNSIGNED="$(find src-tauri/gen/android -path '*release*' -name '*-unsigned.apk' | head -1)"
          [ -n "$UNSIGNED" ] || { echo "::error::no unsigned release APK found"; exit 1; }
          echo "unsigned: $UNSIGNED"
          if [ -n "${KS_B64:-}" ]; then
            echo "$KS_B64" | base64 -d > /tmp/sign.jks
            KS=/tmp/sign.jks; SP="$KS_PASS"; AL="$KEY_ALIAS"; KP="$KEY_PASS"
            echo "RELEASE_SIGNED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — signing with an ephemeral debug key (installable, but NOT update-compatible). Set the signing secrets for stable releases."
            keytool -genkeypair -keystore /tmp/sign.jks -storepass android -keypass android \
              -alias voxterm -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=VoxTerm, O=VoxTerm, C=US"
            KS=/tmp/sign.jks; SP=android; AL=voxterm; KP=android
            echo "RELEASE_SIGNED=false" >> "$GITHUB_ENV"
          fi
          # Stable asset name so the rolling release clobbers the prior APK (the
          # version lives inside the APK as versionCode/Name, not in the filename).
          OUT="VoxTerm-android-arm64.apk"
          "$BT/zipalign" -p -f 4 "$UNSIGNED" /tmp/aligned.apk
          "$BT/apksigner" sign --ks "$KS" --ks-pass "pass:$SP" --key-pass "pass:$KP" \
            --ks-key-alias "$AL" --out "$OUT" /tmp/aligned.apk
          "$BT/apksigner" verify "$OUT"
          rm -f /tmp/sign.jks /tmp/aligned.apk
          SHA="$(sha256sum "$OUT" | cut -d' ' -f1)"
          echo "APK_FILE=$OUT" >> "$GITHUB_ENV"
          echo "APK_SHA256=$SHA" >> "$GITHUB_ENV"
          echo "built $OUT  sha256=$SHA"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxTerm-android-arm64
          path: ${{ env.APK_FILE }}
          if-no-files-found: error

      - name: Publish rolling Android release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: VoxTerm Android (latest build)
          prerelease: true
          body: |
            Latest on-device Android build from `main` (run #${{ github.run_number }}, version `${{ env.APP_VERSION }}`).

            **Install:** download **`${{ env.APK_FILE }}`** below and open it on your phone (you'll need to allow "install unknown apps"). Full [install guide](https://github.com/dmarzzz/VoxTerm/blob/main/docs/android-install.md).

            arm64-v8a · Android 7+ (API 24) · fully offline · microphone only.

            - SHA-256: `${{ env.APK_SHA256 }}`
            - Release-signed: `${{ env.RELEASE_SIGNED }}` — if `false`, this build is debug-signed; updating over a previous install may require an uninstall. Set the signing secrets to fix.
          files: ${{ env.APK_FILE }}
