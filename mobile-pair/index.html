<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VoxTerm — Connect</title>
<style>
  :root {
    --bg:#0e0f13; --bg-elev:#16181f; --line:#262a33; --text:#e6e8ee;
    --muted:#9aa1ad; --faint:#7d8694; --accent:#5eead4; --accent-dim:#2dd4bf; --ink:#06231e;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font:16px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; justify-content:center;
    padding:max(28px,env(safe-area-inset-top)) max(22px,env(safe-area-inset-left))
            max(28px,env(safe-area-inset-bottom)) max(22px,env(safe-area-inset-right));
  }
  .wrap { width:100%; max-width:440px; margin:0 auto; }
  h1 { font-size:24px; margin:0 0 4px; letter-spacing:-.01em; }
  h1 .dot { color:var(--accent); }
  p.sub { color:var(--muted); margin:0 0 24px; font-size:14px; }
  label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.07em;
          color:var(--faint); margin:16px 0 6px; }
  input {
    width:100%; min-height:48px; padding:12px 14px; font-size:16px;
    background:var(--bg-elev); color:var(--text); border:1px solid var(--line);
    border-radius:12px; outline:none;
  }
  input:focus { border-color:var(--accent); }
  .row { display:flex; gap:12px; }
  .row .host { flex:3; } .row .port { flex:1; }
  button {
    width:100%; min-height:52px; margin-top:26px; font-size:16px; font-weight:600;
    background:var(--accent); color:var(--ink); border:none; border-radius:14px; cursor:pointer;
  }
  button:active { filter:brightness(.94); }
  .hint { color:var(--faint); font-size:12.5px; margin-top:18px; }
  .hint code { color:var(--accent-dim); background:var(--bg-elev); padding:1px 6px; border-radius:6px; }
  .err { color:#ff7a85; font-size:13.5px; min-height:18px; margin-top:12px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>VoxTerm<span class="dot">.</span></h1>
    <p class="sub">Connect to VoxTerm running on your computer — over your own Wi‑Fi, no cloud.</p>

    <label for="host">Desktop address</label>
    <div class="row">
      <input class="host" id="host" inputmode="decimal" autocomplete="off"
             autocapitalize="off" spellcheck="false" placeholder="192.168.1.50" />
      <input class="port" id="port" inputmode="numeric" autocomplete="off" placeholder="8740" value="8740" />
    </div>

    <label for="token">Access token</label>
    <input id="token" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="paste the token VoxTerm printed" />

    <button id="go">Connect</button>
    <div class="err" id="err"></div>

    <p class="hint">On your computer run <code>VOXTERM_GUI_LAN=1 python -m gui.server</code> —
      it prints the address and token to paste here. The phone never records; your desktop does.</p>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  // prefill from last successful pairing (kept only on this device)
  try {
    const s = JSON.parse(localStorage.getItem("voxterm.pair") || "{}");
    if (s.host) $("host").value = s.host;
    if (s.port) $("port").value = s.port;
    if (s.token) $("token").value = s.token;
  } catch (_) {}

  function connect() {
    const host = $("host").value.trim();
    const port = ($("port").value.trim() || "8740");
    const token = $("token").value.trim();
    if (!host) { $("err").textContent = "Enter your desktop's address."; return; }
    if (!token) { $("err").textContent = "Enter the access token VoxTerm printed."; return; }
    if (!/^[0-9]+$/.test(port)) { $("err").textContent = "Port must be a number."; return; }
    try { localStorage.setItem("voxterm.pair", JSON.stringify({ host, port, token })); } catch (_) {}
    // The desktop serves the full UI + API + SSE from this one origin, and app.js reads
    // the token from the query string — so everything works once we land there.
    window.location.href = "http://" + host + ":" + port + "/?token=" + encodeURIComponent(token);
  }
  $("go").addEventListener("click", connect);
  $("token").addEventListener("keydown", (e) => { if (e.key === "Enter") connect(); });
</script>
</body>
</html>
